<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderLust AI - Booking History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #F8BBD9;
            min-height: 100vh;
            color: #8B1538;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #E91E63;
            border-bottom: 2px solid #C2185B;
            padding: 1rem 0;
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: #FCE4EC;
        }

        .logo i {
            font-size: 1.8rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 2rem 2rem;
            min-height: 100vh;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #8B1538;
            margin-bottom: 1rem;
        }

        .page-subtitle {
            font-size: 1.1rem;
            color: #C2185B;
        }

        .bookings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .booking-card {
            background: #FCE4EC;
            border-radius: 15px;
            border: 2px solid #E91E63;
            padding: 2rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .booking-card:hover {
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .booking-id {
            font-size: 0.9rem;
            color: #8B1538;
            font-weight: bold;
        }

        .booking-status {
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-confirmed {
            background: #C8E6C9;
            color: #2E7D32;
            border: 2px solid #4CAF50;
        }

        .status-pending {
            background: #FFE0B2;
            color: #F57C00;
            border: 2px solid #FF9800;
        }

        .booking-details {
            margin-bottom: 2rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid #E91E63;
        }

        .detail-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .detail-label {
            color: #C2185B;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
        }

        .detail-value {
            color: #8B1538;
            font-weight: bold;
        }

        .booking-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #E91E63;
            color: #FCE4EC;
            flex: 1;
        }

        .btn-primary:hover {
            background: #C2185B;
        }

        .btn-secondary {
            background: #F8BBD9;
            color: #8B1538;
            border: 2px solid #E91E63;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #FCE4EC;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: #FCE4EC;
            border-radius: 15px;
            border: 2px solid #E91E63;
        }

        .empty-icon {
            font-size: 4rem;
            color: #E91E63;
            margin-bottom: 1rem;
        }

        .empty-title {
            font-size: 1.5rem;
            color: #8B1538;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .empty-text {
            color: #C2185B;
        }

        @media (max-width: 768px) {
            .container {
                padding: 100px 1rem 1rem;
            }
            
            .bookings-grid {
                grid-template-columns: 1fr;
            }
            
            .booking-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">
                <i class="fas fa-plane"></i>
                <span class="logo-text">WanderLust AI</span>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Booking History</h1>
            <p class="page-subtitle">Manage your travel bookings and view tickets</p>
        </div>

        <div id="bookings-container">
            <!-- Bookings will be populated by JavaScript -->
        </div>
    </div>

    <script>
        // Sample booking data
        const sampleBookings = [
            {
                id: 'WL001ABC',
                passengerName: 'Sadhana M',
                destination: 'Goa, India',
                duration: '5 days',
                seatNumber: '12A',
                status: 'confirmed',
                bookingDate: '2024-01-15',
                departureDate: '2024-02-10',
                budget: '₹45,000',
                interests: ['Beach', 'Culture', 'Food', 'Relaxation'],
                hotelType: '4-star'
            },
            {
                id: 'WL002DEF',
                passengerName: 'Sadhana M',
                destination: 'Paris, France',
                duration: '7 days',
                seatNumber: '8C',
                status: 'confirmed',
                bookingDate: '2024-01-20',
                departureDate: '2024-03-15',
                budget: '€2,800',
                interests: ['Culture', 'Art', 'Food', 'Romance'],
                hotelType: '5-star'
            },
            {
                id: 'WL003GHI',
                passengerName: 'Sadhana M',
                destination: 'Bali, Indonesia',
                duration: '10 days',
                seatNumber: '15B',
                status: 'pending',
                bookingDate: '2024-01-25',
                departureDate: '2024-04-20',
                budget: '$1,800',
                interests: ['Nature', 'Adventure', 'Relaxation', 'Culture'],
                hotelType: '4-star'
            }
        ];

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            loadBookings();
        });

        function loadBookings() {
            let bookings = sampleBookings;
            localStorage.setItem('wanderlustBookings', JSON.stringify(sampleBookings));

            const container = document.getElementById('bookings-container');
            
            if (bookings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-ticket-alt"></i>
                        </div>
                        <h3 class="empty-title">No bookings found</h3>
                        <p class="empty-text">Start planning your next adventure!</p>
                    </div>
                `;
                return;
            }

            const bookingsGrid = document.createElement('div');
            bookingsGrid.className = 'bookings-grid';

            bookings.forEach(booking => {
                const bookingCard = createBookingCard(booking);
                bookingsGrid.appendChild(bookingCard);
            });

            container.appendChild(bookingsGrid);
        }

        function createBookingCard(booking) {
            const card = document.createElement('div');
            card.className = 'booking-card';
            
            const statusClass = booking.status === 'confirmed' ? 'status-confirmed' : 'status-pending';
            const statusIcon = booking.status === 'confirmed' ? 'fas fa-check-circle' : 'fas fa-clock';

            card.innerHTML = `
                <div class="booking-header">
                    <div class="booking-id">#${booking.id}</div>
                    <div class="booking-status ${statusClass}">
                        <i class="${statusIcon}"></i>
                        ${booking.status.charAt(0).toUpperCase() + booking.status.slice(1)}
                    </div>
                </div>
                
                <div class="booking-details">
                    <div class="detail-row">
                        <div class="detail-label">
                            <i class="fas fa-user"></i>
                            Passenger
                        </div>
                        <div class="detail-value">${booking.passengerName}</div>
                    </div>
                    
                    <div class="detail-row">
                        <div class="detail-label">
                            <i class="fas fa-map-marker-alt"></i>
                            Destination
                        </div>
                        <div class="detail-value">${booking.destination}</div>
                    </div>
                    
                    <div class="detail-row">
                        <div class="detail-label">
                            <i class="fas fa-calendar"></i>
                            Duration
                        </div>
                        <div class="detail-value">${booking.duration}</div>
                    </div>
                    
                    <div class="detail-row">
                        <div class="detail-label">
                            <i class="fas fa-chair"></i>
                            Seat
                        </div>
                        <div class="detail-value">${booking.seatNumber}</div>
                    </div>
                    
                    <div class="detail-row">
                        <div class="detail-label">
                            <i class="fas fa-plane-departure"></i>
                            Departure
                        </div>
                        <div class="detail-value">${formatDate(booking.departureDate)}</div>
                    </div>
                </div>
                
                <div class="booking-actions">
                    <button class="btn btn-primary" onclick="viewTripDetails('${booking.id}')">
                        <i class="fas fa-map-marked-alt"></i>
                        View Details
                    </button>
                    <button class="btn btn-secondary" onclick="viewTicket('${booking.id}')">
                        <i class="fas fa-ticket-alt"></i>
                        View Ticket
                    </button>
                </div>
            `;

            return card;
        }

        function viewTripDetails(bookingId) {
            const bookings = JSON.parse(localStorage.getItem('wanderlustBookings')) || [];
            const selectedBooking = bookings.find(booking => booking.id === bookingId);
            
            if (selectedBooking) {
                localStorage.setItem('selectedTripDetails', JSON.stringify(selectedBooking));
                window.location.href = 'trip-details.html';
            } else {
                alert('Booking not found!');
            }
        }

        function viewTicket(bookingId) {
            const bookings = JSON.parse(localStorage.getItem('wanderlustBookings')) || [];
            const selectedBooking = bookings.find(booking => booking.id === bookingId);
            
            if (selectedBooking) {
                localStorage.setItem('selectedBooking', JSON.stringify(selectedBooking));
                window.location.href = 'ticket.html';
            } else {
                alert('Booking not found!');
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }
    </script>
</body>
</html>
