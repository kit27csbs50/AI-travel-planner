<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderLust AI - Trip Details</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Arial:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Trip Details Specific Styles */
        body {
            font-family: 'Arial', sans-serif;
            background: #F8BBD9;
            min-height: 100vh;
            color: #8B1538;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #E91E63;
            border-bottom: 2px solid #C2185B;
            padding: 1rem 0;
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: #FCE4EC;
        }

        .logo i {
            font-size: 1.8rem;
        }

        .back-btn {
            background: #F8BBD9;
            color: #8B1538;
            border: 2px solid #C2185B;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
        }

        .back-btn:hover {
            background: #FCE4EC;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 2rem 2rem;
            min-height: 100vh;
        }

        .trip-header {
            background: #FCE4EC;
            border-radius: 15px;
            border: 2px solid #E91E63;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .trip-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #8B1538;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .trip-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .summary-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #8B1538;
            font-weight: bold;
        }

        .summary-item i {
            color: #E91E63;
            font-size: 1.2rem;
        }

        .trip-interests {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .interest-tag {
            padding: 0.4rem 0.8rem;
            background: #FFF0F5;
            border: 2px solid #E91E63;
            border-radius: 15px;
            font-size: 0.8rem;
            color: #8B1538;
            font-weight: bold;
        }

        .itinerary-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.8rem;
            color: #8B1538;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .day-card {
            background: #FCE4EC;
            border-radius: 15px;
            border: 2px solid #E91E63;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .day-card:hover {
            transform: translateY(-2px);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #E91E63;
        }

        .day-title {
            color: #8B1538;
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .day-weather {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #C2185B;
            font-size: 0.9rem;
        }

        .activities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .activity-card {
            background: #FFF0F5;
            border: 2px solid #E91E63;
            border-radius: 12px;
            padding: 1.5rem;
        }

        .activity-card:hover {
            background: #F8BBD9;
            transform: translateY(-2px);
        }

        .activity-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .activity-icon {
            width: 50px;
            height: 50px;
            background: #F8BBD9;
            border: 2px solid #E91E63;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8B1538;
            font-size: 1.2rem;
        }

        .activity-info h4 {
            color: #8B1538;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
            font-weight: bold;
        }

        .activity-time {
            color: #C2185B;
            font-size: 0.9rem;
        }

        .activity-description {
            color: #8B1538;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .activity-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .activity-cost {
            color: #E91E63;
            font-weight: bold;
        }

        .activity-duration {
            color: #C2185B;
        }

        .recommendations-section {
            background: #FCE4EC;
            border: 2px solid #E91E63;
            border-radius: 15px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .recommendation-card {
            background: #FFF0F5;
            border: 2px solid #E91E63;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .recommendation-icon {
            font-size: 2rem;
            color: #E91E63;
            margin-bottom: 1rem;
        }

        .recommendation-title {
            color: #8B1538;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .recommendation-text {
            color: #8B1538;
            font-size: 0.9rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex: 1;
            min-width: 200px;
        }

        .btn-primary {
            background: #E91E63;
            color: #FCE4EC;
        }

        .btn-primary:hover {
            background: #C2185B;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #F8BBD9;
            color: #8B1538;
            border: 2px solid #E91E63;
        }

        .btn-secondary:hover {
            background: #FCE4EC;
        }

        @media (max-width: 768px) {
            .container {
                padding: 100px 1rem 1rem;
            }
            
            .trip-header {
                padding: 2rem 1.5rem;
            }
            
            .trip-title {
                font-size: 2rem;
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            
            .trip-summary {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .activities-grid {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">
                <span class="logo-text">WanderLust</span>
            </div>
            <a href="booking-history.html" class="back-btn">
                ← Back to My Trips
            </a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <!-- Trip Header -->
        <div class="trip-header">
            <h1 class="trip-title" id="trip-title">
                <span id="destination-name">Loading...</span>
            </h1>
            
            <div class="trip-summary" id="trip-summary">
                <!-- Summary items will be populated by JavaScript -->
            </div>
            
            <div class="trip-interests" id="trip-interests">
                <!-- Interest tags will be populated by JavaScript -->
            </div>
        </div>

        <!-- Itinerary Section -->
        <div class="itinerary-section">
            <h2 class="section-title">
                Your Day-by-Day Plan
            </h2>
            <div id="itinerary-container">
                <!-- Day cards will be populated by JavaScript -->
            </div>
        </div>

        <!-- Recommendations Section -->
        <div class="recommendations-section">
            <h2 class="section-title">
                Our Recommendations
            </h2>
            <div class="recommendations-grid" id="recommendations-grid">
                <!-- Recommendations will be populated by JavaScript -->
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="downloadItinerary()">
                Download Itinerary
            </button>
            <button class="btn btn-secondary" onclick="shareTrip()">
                Share Trip
            </button>
            <button class="btn btn-secondary" onclick="modifyTrip()">
                Modify Trip
            </button>
        </div>
    </div>

    <script>
        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            loadTripDetails();
        });

        function loadTripDetails() {
            // Get selected booking from localStorage
            const selectedBooking = JSON.parse(localStorage.getItem('selectedTripDetails'));
            
            if (!selectedBooking) {
                alert('No trip selected. Redirecting to booking history.');
                window.location.href = 'booking-history.html';
                return;
            }

            // Generate AI itinerary based on booking details
            const tripData = generateAIItinerary(selectedBooking);
            
            // Populate the page
            populateTripHeader(tripData);
            populateItinerary(tripData);
            populateRecommendations(tripData);
        }

        function populateTripHeader(tripData) {
            document.getElementById('destination-name').textContent = tripData.destination;
            
            const summaryContainer = document.getElementById('trip-summary');
            summaryContainer.innerHTML = `
                <div class="summary-item">
                    <i class="fas fa-calendar"></i>
                    <span>${tripData.duration} days</span>
                </div>
                <div class="summary-item">
                    <i class="fas fa-rupee-sign"></i>
                    <span>${tripData.budget}</span>
                </div>
                <div class="summary-item">
                    <i class="fas fa-cloud-sun"></i>
                    <span>${tripData.weather}</span>
                </div>
                <div class="summary-item">
                    <i class="fas fa-user"></i>
                    <span>${tripData.passengerName}</span>
                </div>
                <div class="summary-item">
                    <i class="fas fa-ticket-alt"></i>
                    <span>#${tripData.id}</span>
                </div>
            `;
            
            const interestsContainer = document.getElementById('trip-interests');
            interestsContainer.innerHTML = tripData.interests.map(interest => 
                `<span class="interest-tag">${interest}</span>`
            ).join('');
        }

        function populateItinerary(tripData) {
            const container = document.getElementById('itinerary-container');
            
            tripData.activities.forEach(day => {
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                
                dayCard.innerHTML = `
                    <div class="day-header">
                        <div class="day-title">
                            <i class="fas fa-calendar-day"></i>
                            Day ${day.day}: ${day.theme}
                        </div>
                        <div class="day-weather">
                            <i class="fas fa-thermometer-half"></i>
                            ${day.weather}
                        </div>
                    </div>
                    
                    <div class="activities-grid">
                        ${day.activities.map(activity => `
                            <div class="activity-card">
                                <div class="activity-header">
                                    <div class="activity-icon">
                                        <i class="${activity.icon}"></i>
                                    </div>
                                    <div class="activity-info">
                                        <h4>${activity.title}</h4>
                                        <div class="activity-time">${activity.time}</div>
                                    </div>
                                </div>
                                <div class="activity-description">
                                    ${activity.description}
                                </div>
                                <div class="activity-details">
                                    <div class="activity-cost">${activity.cost}</div>
                                    <div class="activity-duration">${activity.duration}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                container.appendChild(dayCard);
            });
        }

        function populateRecommendations(tripData) {
            const container = document.getElementById('recommendations-grid');
            
            container.innerHTML = tripData.recommendations.map(rec => `
                <div class="recommendation-card">
                    <div class="recommendation-icon">
                        <i class="${rec.icon}"></i>
                    </div>
                    <div class="recommendation-title">${rec.title}</div>
                    <div class="recommendation-text">${rec.text}</div>
                </div>
            `).join('');
        }

        function downloadItinerary() {
            const selectedBooking = JSON.parse(localStorage.getItem('selectedTripDetails'));
            const link = document.createElement('a');
            link.download = `WanderLust-AI-Itinerary-${selectedBooking.destination.replace(/\s+/g, '-')}.pdf`;
            link.href = 'data:text/plain;charset=utf-8,WanderLust AI Detailed Itinerary - ' + selectedBooking.destination;
            link.click();
            
            showNotification('Itinerary downloaded successfully! 📄');
        }

        function shareTrip() {
            const selectedBooking = JSON.parse(localStorage.getItem('selectedTripDetails'));
            const shareText = `Check out my amazing ${selectedBooking.destination} trip planned with WanderLust AI! ${selectedBooking.duration} of adventure awaits! 🌟`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'My WanderLust AI Trip',
                    text: shareText,
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(shareText).then(() => {
                    showNotification('Trip details copied to clipboard! 📋');
                });
            }
        }

        function modifyTrip() {
            showNotification('Trip modification feature coming soon! ✨');
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                background: rgba(255, 215, 0, 0.95);
                color: #0f4c3a;
                padding: 1rem 1.5rem;
                border-radius: 12px;
                font-weight: 600;
                z-index: 10000;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
                backdrop-filter: blur(10px);
                animation: slideInRight 0.3s ease-out;
            `;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease-in';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }, 3000);
        }

        // Add CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOutRight {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
