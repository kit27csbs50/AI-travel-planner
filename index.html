<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderLust AI - AI Travel Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Arial:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">
                <span class="logo-text">WanderLust</span>
            </div>
            <p class="subtitle">Your personal travel companion</p>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <!-- Step 1: Travel Form -->
        <div id="travel-form" class="card active">
            <h2 class="form-title">Plan Your Dream Trip</h2>
            
            <form id="travelPlanForm">
                <!-- Row 1 -->
                <div class="form-row">
                    <div class="input-group">
                        <label for="userName">Your Name</label>
                        <input type="text" id="userName" placeholder="e.g. Sadhana M" required>
                    </div>
                    <div class="input-group">
                        <label for="userAge">Age</label>
                        <input type="number" id="userAge" placeholder="e.g. 25" min="1" max="100" required>
                    </div>
                </div>

                <div class="input-group full-width">
                    <label for="destination">Destination</label>
                    <input type="text" id="destination" placeholder="e.g. Goa, Paris, Bali" required>
                </div>

                <!-- Row 2 -->
                <div class="form-row">
                    <div class="input-group">
                        <label for="budget">Total Budget (INR)</label>
                        <div class="budget-input">
                            <span class="currency">₹</span>
                            <input type="number" id="budget" placeholder="50000" min="1000" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="duration">Duration (Days)</label>
                        <input type="number" id="duration" placeholder="7" min="1" max="30" required>
                    </div>
                </div>

                <!-- Interests Section -->
                <div class="section">
                    <h3>Interests (Select multiple)</h3>
                    <div class="pill-container" id="interests">
                        <button type="button" class="pill-btn" data-interest="adventure">
                            Adventure
                        </button>
                        <button type="button" class="pill-btn" data-interest="beach">
                            Beach
                        </button>
                        <button type="button" class="pill-btn" data-interest="culture">
                            Culture
                        </button>
                        <button type="button" class="pill-btn" data-interest="food">
                            Food
                        </button>
                        <button type="button" class="pill-btn" data-interest="nature">
                            Nature
                        </button>
                        <button type="button" class="pill-btn" data-interest="shopping">
                            Shopping
                        </button>
                        <button type="button" class="pill-btn" data-interest="relaxation">
                            Relaxation
                        </button>
                    </div>
                </div>

                <!-- Food Preferences -->
                <div class="section">
                    <h3>Food Preferences</h3>
                    <div class="pill-container" id="foodPrefs">
                        <button type="button" class="pill-btn" data-food="vegetarian">Vegetarian</button>
                        <button type="button" class="pill-btn" data-food="non-veg">Non-Veg</button>
                        <button type="button" class="pill-btn" data-food="seafood">Seafood</button>
                        <button type="button" class="pill-btn" data-food="vegan">Vegan</button>
                        <button type="button" class="pill-btn" data-food="local">Local Cuisine</button>
                    </div>
                </div>

                <!-- Hotel Preference -->
                <div class="input-group">
                    <label for="hotelPref">Hotel Preference</label>
                    <select id="hotelPref" required>
                        <option value="">Select hotel type</option>
                        <option value="3-star">3-Star Comfort</option>
                        <option value="4-star">4-Star Premium</option>
                        <option value="5-star">5-Star Luxury</option>
                    </select>
                </div>

                <!-- Extra Option -->
                <div class="toggle-section">
                    <label class="toggle-label">
                        <span>Nightlife / Clubs?</span>
                        <div class="toggle-switch">
                            <input type="checkbox" id="nightlife">
                            <span class="slider"></span>
                        </div>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="primary-btn">
                    Generate Itinerary ✨
                </button>
            </form>
        </div>

        <!-- Step 2: AI Processing -->
        <div id="ai-processing" class="card">
            <div class="processing-content">
                <div class="airplane-animation">
                    <i class="fas fa-plane"></i>
                </div>
                <h2 class="processing-text">AI is curating your perfect travel plan...</h2>
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>

        <!-- Step 3: Itinerary Output -->
        <div id="itinerary-output" class="card">
            <div class="itinerary-header">
                <h2 id="itinerary-title">Your Dream Itinerary</h2>
                <div class="trip-summary">
                    <div class="summary-item">
                        <span id="summary-destination"></span>
                    </div>
                    <div class="summary-item">
                        <span id="summary-budget"></span>
                    </div>
                    <div class="summary-item">
                        <span id="summary-duration"></span>
                    </div>
                </div>
                <div class="selected-interests" id="summary-interests"></div>
            </div>

            <div class="itinerary-days" id="itinerary-days">
                <!-- Days will be populated by JavaScript -->
            </div>

            <button class="primary-btn" id="confirm-booking">
                Confirm Booking
            </button>
        </div>

        <!-- Step 4: Booking Confirmation -->
        <div id="booking-confirmation" class="card">
            <div class="confirmation-content">
                <div class="checkmark-animation">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h2>🎉 Dream destination confirmed!</h2>
                <p>Let the countdown begin.</p>
                <button class="primary-btn" id="view-ticket">
                    View Ticket
                </button>
            </div>
        </div>

        <!-- Step 5: Travel Ticket -->
        <div id="travel-ticket" class="card">
            <div class="ticket-container">
                <div class="ticket-header">
                    <h2>✈️ Travel Ticket</h2>
                    <div class="ticket-logo">WanderLust AI</div>
                </div>
                
                <div class="ticket-content">
                    <div class="ticket-row">
                        <div class="ticket-field">
                            <label>Passenger Name</label>
                            <span id="ticket-name"></span>
                        </div>
                        <div class="ticket-field">
                            <label>Booking ID</label>
                            <span id="ticket-booking-id"></span>
                        </div>
                    </div>
                    
                    <div class="ticket-row">
                        <div class="ticket-field">
                            <label>Destination</label>
                            <span id="ticket-destination"></span>
                        </div>
                        <div class="ticket-field">
                            <label>Duration</label>
                            <span id="ticket-duration"></span>
                        </div>
                    </div>
                    
                    <div class="ticket-row">
                        <div class="ticket-field">
                            <label>Seat Number</label>
                            <span id="ticket-seat"></span>
                        </div>
                        <div class="qr-code">
                            <div class="qr-pattern"></div>
                            <span>QR Code</span>
                        </div>
                    </div>
                </div>
                
                <div class="ticket-actions">
                    <button class="secondary-btn" id="download-ticket">
                        <i class="fas fa-download"></i> Download Ticket
                    </button>
                    <button class="secondary-btn" id="view-bookings">
                        <i class="fas fa-history"></i> View Booking History
                    </button>
                    <button class="primary-btn" id="new-trip">
                        Plan New Trip
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
